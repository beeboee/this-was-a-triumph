download:
  name: Download voice lines
  description: Download Portal and Portal 2 GLaDOS voice lines, plus completion songs when available, and rebuild the local quote index.
  fields:
    overwrite:
      name: Overwrite existing audio files
      description: Re-download audio files that already exist in /config/www/glados_voice/audio.
      required: false
      default: false
      selector:
        boolean:
    concurrency:
      name: Download concurrency
      description: Number of audio files to download in parallel. Keep this low to be polite to Portal Wiki and Valve's soundtrack host.
      required: false
      default: 4
      selector:
        number:
          min: 1
          max: 8
          mode: box

rebuild_index:
  name: Rebuild index
  description: Reload the existing generated index. This is mostly a sanity-check service.

save_progress:
  name: Save playback progress
  description: Save the card's heard-line progress to /config/www/glados_voice/progress.json.
  fields:
    by_game:
      name: Progress by game
      description: Map of game names to heard voice-line ids.
      required: true
      selector:
        object:

reset_progress:
  name: Reset playback progress
  description: Clear persisted heard-line progress.
